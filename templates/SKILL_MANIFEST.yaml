name: example-skill
version: 0.1.0
type: skill-app

description: >
  Describe what this Skill App does.

runtime:
  agent_role: researcher
  requires_audit: true

inputs:
  - name: task_card
    type: task_contract
    required: true
  - name: source_bundle
    type: mounted_sources
    required: true

outputs:
  - name: primary_output
    type: markdown
    path: .agent-os/outputs/{task_id}/output.md
  - name: handoff_report
    type: markdown
    path: .agent-os/handoffs/HANDOFF-{task_id}.md

permissions:
  read:
    - mounted_sources
    - task_card
  write:
    - outputs/
    - handoffs/
  forbidden:
    - sources/source_law/
    - registry/
    - archive/cold/

policies:
  source_priority: strict
  uncertainty_policy: mark_unknown
  mutation_policy: no_core_source_mutation

audit:
  required_by:
    - host
