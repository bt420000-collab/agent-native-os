# Deprecated alias kept for compatibility.
# New apps should use templates/APP_MANIFEST.yaml.

app_id: ano.skill.example
package_name: ano-example-skill-app
display_name: ANO Example Skill App
version: 0.1.0
type: skill_app
standard: agent-native-os
standard_version: 0.2.2
runtime: ano

install:
  user_prompt_zh: 即将安装一个示例 Skill App。
  user_prompt_en: You are about to install an example Skill App.

commercial:
  pricing_model: free
  license: Apache-2.0
  payment_required: false

agent_policy:
  app_controller:
    role_id: example.coordinator
    display_name: Example Coordinator
    can_request_subagents: true
    is_host: false
  subagents: []

context_permission_request:
  default_mode: normal
  context_budget:
    requested_level: low
  workspace_permissions:
    read: []
    write: []
    denied:
      - ano/kernel/
