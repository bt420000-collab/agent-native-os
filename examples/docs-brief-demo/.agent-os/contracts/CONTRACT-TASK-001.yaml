contract_id: CONTRACT-TASK-001
task_id: TASK-001
skill_app: documentation-brief
status: active

outputs:
  - name: documentation_brief
    type: markdown
    path: .agent-os/outputs/TASK-001/documentation_brief.md
  - name: handoff_report
    type: markdown
    path: .agent-os/handoffs/HANDOFF-TASK-001.md

documentation_brief_required_sections:
  - Summary
  - Key Findings
  - Unknowns
  - Risks
  - Next Steps

handoff_report_required_sections:
  - Metadata
  - Sources Used
  - Outputs Created
  - Decisions Made
  - Uncertainties
  - Risks
  - Next Steps
  - Audit Status

forbidden_changes:
  - .agent-os/sources/
  - .agent-os/tasks/
  - .agent-os/mounts/
  - .agent-os/contracts/
  - skills/

validation:
  method: checklist
  validator_role: Host
  audit_required: true

completion_checklist:
  - documentation_brief exists.
  - handoff_report exists.
  - Required sections are present.
  - Unknowns are marked explicitly.
  - Only mounted sources were used.
  - Forbidden paths were not modified.
