role: Researcher
skill_app: documentation-brief

read_permissions:
  - mounted_sources
  - task_card
  - source_mount
  - output_contract
  - skill_instructions

write_permissions:
  - .agent-os/outputs/
  - .agent-os/handoffs/

forbidden_paths:
  - .agent-os/sources/
  - .agent-os/tasks/
  - .agent-os/mounts/
  - .agent-os/contracts/
  - skills/
  - archive/
  - registry/
  - private_editions/

audit_authority: []

mutation_policy: no_core_source_mutation

notes: >
  This Skill App may create outputs and handoffs only. It may not modify
  mounted sources, task cards, contracts, or its own skill files.
