name: documentation-brief
version: 0.2.0
type: skill-app

description: >
  Produce a concise documentation brief from mounted project sources while
  preserving source authority, unknowns, handoff state, and audit readiness.

runtime:
  agent_role: Researcher
  requires_audit: true

inputs:
  - name: source_mount
    type: source_mount
    path: .agent-os/mounts/MOUNT-001.yaml
    required: true
  - name: task_card
    type: task_card
    path: .agent-os/tasks/TASK-001.md
    required: true
  - name: output_contract
    type: output_contract
    path: .agent-os/contracts/CONTRACT-TASK-001.yaml
    required: true

outputs:
  - name: documentation_brief
    type: markdown
    path: .agent-os/outputs/TASK-001/documentation_brief.md
  - name: handoff_report
    type: typed_markdown
    path: .agent-os/handoffs/HANDOFF-TASK-001.md

permissions:
  read:
    - .agent-os/sources/current_requirements.md
    - .agent-os/sources/project_notes.md
    - .agent-os/tasks/TASK-001.md
    - .agent-os/mounts/MOUNT-001.yaml
    - .agent-os/contracts/CONTRACT-TASK-001.yaml
  write:
    - .agent-os/outputs/TASK-001/
    - .agent-os/handoffs/
  forbidden:
    - archive/
    - registry/

policies:
  source_priority: strict
  uncertainty_policy: mark_unknown
  mutation_policy: no_source_mutation

audit:
  required_by:
    - Host
