name: documentation-brief
version: 0.1.0
type: skill-app

description: >
  Create a concise documentation brief from mounted sources while preserving
  unknowns, risks, and handoff state.

runtime:
  agent_role: Researcher
  requires_audit: true

inputs:
  - name: task_card
    type: task_contract
    required: true
  - name: source_mount
    type: mounted_sources
    required: true
  - name: output_contract
    type: output_contract
    required: true

outputs:
  - name: documentation_brief
    type: markdown
    path: .agent-os/outputs/{task_id}/documentation_brief.md
  - name: handoff_report
    type: markdown
    path: .agent-os/handoffs/HANDOFF-{task_id}.md

permissions:
  read:
    - mounted_sources
    - task_card
    - output_contract
    - skill_instructions
  write:
    - .agent-os/outputs/
    - .agent-os/handoffs/
  forbidden:
    - .agent-os/sources/
    - .agent-os/tasks/
    - .agent-os/mounts/
    - .agent-os/contracts/
    - skills/
    - archive/
    - registry/

policies:
  source_priority: strict
  uncertainty_policy: mark_unknown
  mutation_policy: no_core_source_mutation
  hallucination_policy: mounted_sources_only

audit:
  required_by:
    - Host
